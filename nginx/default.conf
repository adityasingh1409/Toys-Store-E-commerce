# ═══════════════════════════════════════════════════════
#  Nginx Configuration for Laravel
#  File: nginx/default.conf
# ═══════════════════════════════════════════════════════

server {
    listen 80;
    server_name localhost;

    # Laravel public directory is the web root
    root /var/www/public;
    index index.php index.html;

    # Logging
    access_log /var/log/nginx/toystore_access.log;
    error_log  /var/log/nginx/toystore_error.log;

    # Max upload size (for product images)
    client_max_body_size 50M;

    # ─────────────────────────────────────────
    #  Main location — Laravel routing
    #  Tries file → directory → Laravel router
    # ─────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ─────────────────────────────────────────
    #  PHP files — forward to PHP-FPM container
    # ─────────────────────────────────────────
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;

        # "app" is the container name in docker-compose
        fastcgi_pass app:9000;
        fastcgi_index index.php;

        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;

        # Timeouts
        fastcgi_connect_timeout 60s;
        fastcgi_send_timeout    180s;
        fastcgi_read_timeout    180s;
    }

    # ─────────────────────────────────────────
    #  Static assets — serve with long cache
    # ─────────────────────────────────────────
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        try_files $uri $uri/ =404;
    }

    # ─────────────────────────────────────────
    #  Laravel storage symlink (uploaded files)
    # ─────────────────────────────────────────
    location /storage/ {
        alias /var/www/storage/app/public/;
    }

    # ─────────────────────────────────────────
    #  Security — block hidden files (.env, .git)
    # ─────────────────────────────────────────
    location ~ /\.(?!well-known).* {
        deny all;
        return 404;
    }

    # Block direct access to sensitive files
    location ~ ^/(\.env|composer\.(json|lock)|package\.json|Dockerfile) {
        deny all;
        return 404;
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;
}
