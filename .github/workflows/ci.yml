# ═══════════════════════════════════════════════════════
#  GitHub Actions CI Pipeline
#  File: .github/workflows/ci.yml
#
#  This runs FREE on GitHub — no server needed!
#  Triggers on every push and pull request to main
#
#  WHAT IT DOES:
#  → Installs PHP + Composer + Node
#  → Runs composer install
#  → Runs npm build
#  → Runs PHPUnit tests
#  → Builds Docker image (verify it works)
# ═══════════════════════════════════════════════════════

name: 🚀 CI Pipeline — Toys Store

on:
  push:
    branches: [ main, dev, staging ]
  pull_request:
    branches: [ main ]

jobs:

  # ───────────────────────────────────────────
  #  JOB 1: Run Tests
  #  Checks code quality before anything else
  # ───────────────────────────────────────────
  test:
    name: 🧪 Test (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php: ['8.2']   # Test on PHP 8.2

    steps:

      # Step 1: Get the code
      - name: 🔁 Checkout Code
        uses: actions/checkout@v4

      # Step 2: Setup PHP with required extensions
      - name: 🐘 Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo_mysql, mbstring, exif, pcntl, bcmath, gd, zip
          coverage: none

      # Step 3: Cache composer packages (faster builds)
      - name: 📦 Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-php-

      # Step 4: Install PHP dependencies (like mvn install)
      - name: 📥 Install PHP Dependencies (Composer)
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      # Step 5: Cache node modules (faster builds)
      - name: 📦 Cache Node modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-

      # Step 6: Install Node dependencies
      - name: 📥 Install Node Dependencies (npm)
        run: npm ci

      # Step 7: Build frontend assets
      - name: 🔨 Build Assets (Vite)
        run: npm run build

      # Step 8: Setup environment file
      - name: ⚙️ Setup Environment
        run: |
          cp .env.example .env
          php artisan key:generate

      # Step 9: Run PHPUnit tests with SQLite in-memory
      - name: 🧪 Run Tests
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'
        run: php artisan test --env=testing

  # ───────────────────────────────────────────
  #  JOB 2: Build Docker Image
  #  Verifies Dockerfile works correctly
  #  Runs only after tests pass
  # ───────────────────────────────────────────
  docker-build:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: test    # Only runs if 'test' job passes

    steps:

      # Step 1: Get the code
      - name: 🔁 Checkout Code
        uses: actions/checkout@v4

      # Step 2: Setup Docker Buildx (faster builds)
      - name: 🐳 Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 3: Build Docker image
      - name: 🔨 Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false           # Don't push to registry (just build to verify)
          tags: toystore:${{ github.sha }}
          cache-from: type=gld,scope=build-toystore
          cache-to: type=gld,mode=max,scope=build-toystore

      - name: ✅ Docker build successful!
        run: echo "Docker image built successfully for commit ${{ github.sha }}"

  # ───────────────────────────────────────────
  #  JOB 3: Code Quality Check
  # ───────────────────────────────────────────
  quality:
    name: 🔍 Code Quality
    runs-on: ubuntu-latest

    steps:

      - name: 🔁 Checkout Code
        uses: actions/checkout@v4

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: 📥 Install Dependencies
        run: composer install --no-interaction --prefer-dist

      # Check for syntax errors in all PHP files
      - name: 🔍 PHP Syntax Check
        run: find app -name "*.php" -exec php -l {} \; | grep -v "No syntax errors"  || true

      # Check .env.example has all needed variables
      - name: 📋 Check .env.example exists
        run: test -f .env.example && echo "✅ .env.example found" || (echo "❌ .env.example missing!" && exit 1)

      # Verify Dockerfile exists
      - name: 🐳 Check Dockerfile exists
        run: test -f Dockerfile && echo "✅ Dockerfile found" || (echo "❌ Dockerfile missing!" && exit 1)
